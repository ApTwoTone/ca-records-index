name: doc-pages-retry-failures
# Backfill documents whose prior page pull had failed pages or hit max_pages.
on:
  workflow_dispatch:
    inputs:
      source_page_run_id: { required: true, type: string }
      pages: { required: false, type: string, default: "25" }
      shards: { required: false, type: string, default: "4" }
      delay_min: { required: false, type: string, default: "5.0" }
      delay_max: { required: false, type: string, default: "7.0" }
      attempts: { required: false, type: string, default: "6" }

permissions:
  actions: read
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      doc_count: ${{ steps.gen.outputs.doc_count }}
    steps:
      - uses: actions/checkout@v4
      - name: download prior page artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p artifacts doclists
          gh run download "${{ inputs.source_page_run_id }}" -R "${{ github.repository }}" -D artifacts
      - id: gen
        run: |
          python3 - "${{ inputs.shards }}" <<'PY' >> "$GITHUB_OUTPUT"
          import csv, glob, json, sys
          complete = {"done", "no_pages"}
          shards = max(1, int(sys.argv[1]))
          docs = []
          seen = set()
          for path in sorted(glob.glob("artifacts/**/failed_pages.csv", recursive=True)):
              with open(path, newline="", encoding="utf-8") as fh:
                  for row in csv.DictReader(fh):
                      doc = (row.get("doc_no") or "").strip()
                      if doc and doc not in seen:
                          seen.add(doc)
                          docs.append(doc)
          for path in sorted(glob.glob("artifacts/**/doc_status.csv", recursive=True)):
              with open(path, newline="", encoding="utf-8") as fh:
                  for row in csv.DictReader(fh):
                      doc = (row.get("doc_no") or "").strip()
                      status = (row.get("status") or "").strip()
                      if doc and status not in complete and doc not in seen:
                          seen.add(doc)
                          docs.append(doc)
          docs = sorted(docs, key=lambda d: int(d) if d.isdigit() else d)
          per = -(-len(docs) // shards) if docs else 1
          include = []
          for i in range(shards):
              chunk = docs[i * per:(i + 1) * per]
              if not chunk:
                  continue
              path = f"doclists/retry_doclist_{i}.txt"
              with open(path, "w", encoding="utf-8") as fh:
                  fh.write("\n".join(chunk) + "\n")
              include.append({"i": i, "count": len(chunk)})
          print("matrix=" + json.dumps({"include": include}))
          print("doc_count=" + str(len(docs)))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: retry-doc-page-lists-${{ inputs.source_page_run_id }}
          path: doclists/
          retention-days: 30

  pull:
    needs: plan
    if: ${{ needs.plan.outputs.doc_count != '0' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: retry-doc-page-lists-${{ inputs.source_page_run_id }}
          path: doclists
      - name: pull retry pages for shard ${{ matrix.i }}
        env:
          NETR_PROXY_KEY: ${{ secrets.NETR_PROXY_KEY }}
        run: |
          test -n "$NETR_PROXY_KEY"
          mkdir -p out
          python3 pull_docs.py "doclists/retry_doclist_${{ matrix.i }}.txt" out \
            --max-pages "${{ inputs.pages }}" \
            --attempts "${{ inputs.attempts }}" \
            --delay-min "${{ inputs.delay_min }}" \
            --delay-max "${{ inputs.delay_max }}"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: doc-pages-retry-${{ inputs.source_page_run_id }}-${{ matrix.i }}
          path: out/
          retention-days: 30
      - name: fail visibly if retry pages are still missing or capped
        if: always()
        run: python3 check_doc_pages_complete.py out
