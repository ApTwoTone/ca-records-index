name: thumb-leads
# Pull recorded-document PAGE IMAGES (PNG) for an explicit set of lead doc#s via
# the deployed Cloudflare Worker, so OCR can extract APN + property address off
# the NOD/AOD face. Egresses through Cloudflare IPs (not the home-IP budget).
# doc_list = comma- or newline-separated doc#s (committed as docs_to_pull.txt, or
# passed inline). Sharded across runners.
on:
  workflow_dispatch:
    inputs:
      pages:  { required: false, type: string, default: "25" }  # walk until end-of-doc, capped for safety
      shards: { required: false, type: string, default: "4" }
      delay_min: { required: false, type: string, default: "5.0" }
      delay_max: { required: false, type: string, default: "7.0" }

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: gen
        run: |
          python3 - "$SHARDS" <<'PY' >> "$GITHUB_OUTPUT"
          import sys, json, os
          n=int(sys.argv[1])
          docs=[d.strip() for d in open('docs_to_pull.txt').read().replace(',', '\n').split() if d.strip()]
          per=-(-len(docs)//n) if docs else 1
          sh=[{"i":i,"docs":",".join(docs[i*per:(i+1)*per])} for i in range(n) if i*per < len(docs)]
          print("matrix="+json.dumps({"include":sh}))
          PY
        env:
          SHARDS: ${{ inputs.shards }}

  pull:
    needs: plan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - name: pull pages
        env:
          NETR_PROXY_KEY: ${{ secrets.NETR_PROXY_KEY }}
        run: |
          test -n "$NETR_PROXY_KEY"
          mkdir -p out
          tr ',' '\n' <<< "${{ matrix.docs }}" > doclist.txt
          python3 pull_docs.py doclist.txt out \
            --max-pages "${{ inputs.pages }}" \
            --delay-min "${{ inputs.delay_min }}" \
            --delay-max "${{ inputs.delay_max }}"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: thumb-leads-${{ matrix.i }}
          path: out/
          retention-days: 3
